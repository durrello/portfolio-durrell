<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Blog Post - Durrell Gemuh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DevOps and Cloud Infrastructure Blog">
    <link rel="shortcut icon" href="images/durrell.jpg">
    <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="css/style.min.css" rel="stylesheet" type="text/css" id="theme-opt">
    <link href="css/colors/default.css" rel="stylesheet" id="color-opt">
    <style>
        .blog-post {
            max-width: 800px;
            margin: 0 auto;
        }

        .blog-post header {
            margin-bottom: 3rem;
        }

        .blog-post .featured-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .blog-post h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .post-meta {
            display: flex;
            gap: 2rem;
            font-size: 0.95rem;
            color: #6c757d;
            flex-wrap: wrap;
        }

        .post-meta .author,
        .post-meta .date,
        .post-meta .category {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-meta .category {
            background: #f8f9fa;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            margin: 3rem 0;
        }

        .post-content h2 {
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #212529;
        }

        .post-content h3 {
            font-size: 1.4rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #212529;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content code {
            background: #f5f5f5;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }

        .post-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 1.5rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .post-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .post-content ul,
        .post-content ol {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content a {
            color: #007bff;
            text-decoration: none;
        }

        .post-content a:hover {
            text-decoration: underline;
        }

        .post-tags {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e9ecef;
        }

        .tag {
            display: inline-block;
            background: #e7f3ff;
            color: #0066cc;
            padding: 0.5rem 1rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .tag:hover {
            background: #cce5ff;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #007bff;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        #loading {
            text-align: center;
            padding: 2rem;
        }

        #error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
    </style>
</head>

<body>
    <!-- Navbar Start -->
    <nav id="navbar" class="navbar navbar-expand-lg fixed-top navbar-custom navbar-light sticky">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>DURRELL GEMUH</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span data-feather="menu" class="fea icon-md"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav navbar-nav-link mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About Me</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#services">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="page-blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->
    <div style="height:70px;"></div>
    <section class="section">
        <div class="container">
            <a href="page-blog.html" class="back-link" style="display:inline-flex;align-items:center;gap:0.4rem;color:#0d6efd;font-weight:500;margin-bottom:2rem;text-decoration:none;">← Back to Blog</a>
            
            <!-- Post Container -->
            <div id="post-container"></div>
            
            <!-- Loading state -->
            <div id="loading">
                <p>Loading blog post...</p>
            </div>

            <!-- Error state -->
            <div id="error" style="display: none;"></div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>feather.replace();</script>
    <script src="js/blog-loader.js"></script>
    <script>
        // Get post slug from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('post') || window.location.hash.replace('#', '');

        const loadPost = () => {
            if (!slug) {
                document.getElementById('loading').innerHTML = 
                    '<p>No post specified. <a href="page-blog.html">View all posts</a></p>';
                return;
            }

            const post = BlogLoader.getPost(slug);
            
            if (post) {
                document.getElementById('loading').style.display = 'none';
                
                // Update page title and meta
                document.title = post.title + ' - Durrell Gemuh';
                document.querySelector('meta[name="description"]').setAttribute(
                    'content', 
                    post.description || post.title
                );
                
                document.getElementById('post-container').innerHTML = 
                    BlogLoader.renderPost(post);
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = 
                    '<strong>Post not found.</strong> The post you\'re looking for doesn\'t exist. <a href="page-blog.html">View all posts</a>';
            }
        };

        // Load post after blog loader initializes
        setTimeout(loadPost, 500);
    </script>
</body>

</html>
