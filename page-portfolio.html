<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Portfolio - Durrell Gemuh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of projects - DevOps, Cloud Infrastructure, Kubernetes, CI/CD automation, and more.">
    <link rel="shortcut icon" href="images/durrell.jpg">
    <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="css/style.min.css" rel="stylesheet" type="text/css" id="theme-opt">
    <link href="css/colors/default.css" rel="stylesheet" id="color-opt">
    <style>
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .portfolio-item {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .portfolio-item:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        .portfolio-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .portfolio-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portfolio-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .portfolio-content h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.3rem;
        }

        .portfolio-content p {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .technologies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .tech-badge {
            background: #f0f0f0;
            color: #333;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #ddd;
        }

        .features {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .features li {
            padding: 0.25rem 0;
            color: #555;
        }

        .features li:before {
            content: "✓ ";
            color: #28a745;
            margin-right: 0.5rem;
            font-weight: bold;
        }

        .project-link {
            display: inline-block;
            margin-top: auto;
            padding: 0.75rem 1.5rem;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            text-align: center;
            transition: background 0.3s ease;
        }

        .project-link:hover {
            background: #0056b3;
        }

        #loading {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>

<body>
    <section class="section">
        <div class="container">
            <div class="row align-items-center mb-4 pb-4">
                <div class="col-lg-8">
                    <h1>Portfolio</h1>
                    <p class="text-muted">Projects showcasing DevOps, Cloud Infrastructure, and Automation</p>
                </div>
            </div>

            <!-- Portfolio Grid -->
            <div id="portfolio-projects"></div>

            <!-- Loading state -->
            <div id="loading">
                <p>Loading portfolio projects...</p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/portfolio-loader.js"></script>
    <script>
        // Wait for portfolio to load
        const checkAndRender = () => {
            const projects = PortfolioLoader.getAllProjects();
            
            if (projects.length > 0) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('portfolio-projects').innerHTML = 
                    PortfolioLoader.renderProjectsGrid(projects);
            } else if (PortfolioLoader.projects.length === 0) {
                // Try again in a moment
                setTimeout(checkAndRender, 100);
            } else {
                document.getElementById('loading').innerHTML = '<p>No portfolio projects yet. Check back soon!</p>';
            }
        };

        // Initial check after short delay to ensure loader initialized
        setTimeout(checkAndRender, 500);
    </script>
</body>

</html>
